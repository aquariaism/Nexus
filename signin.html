<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Nexus Campus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/toast.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-left">
            <span class="auth-tag">WELCOME BACK </span>
            <h1> Continue your <br> campus journey. </h1>
            <p> Sign in to explore events, manage registrations, and host experiences.</p>
        </div>

        <div class="auth-card">
            <h2>Sign In</h2>
            <form id="signinForm">
                <input type="email" id="signinEmail" placeholder="Email Address" required>
                <input type="password" id="signinPassword" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            <p class="switch-auth">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>
    <div id="toastContainer"></div>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
